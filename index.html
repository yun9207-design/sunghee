<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아름다운한끼 | 프리미엄 수제도시락</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Noto+Serif+KR:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#F8F4EC;
    --cream-alt:#F0EBDF;
    --heading:#3C4A2C;
    --text:#55574C;
    --dark-green:#333D22;
    --terracotta:#B85C3E;
    --terracotta-dark:#9E4B31;
    --white:#FFFFFF;
    --border:#E4DFD1;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{font-family:'Noto Sans KR', sans-serif; background:var(--cream); color:var(--text); line-height:1.6;}
  h1,h2,h3{font-family:'Noto Serif KR', serif; color:var(--heading);}
  a{text-decoration:none; color:inherit;}
  ul{list-style:none;}
  img{max-width:100%; display:block;}
  .container{max-width:1200px; margin:0 auto; padding:0 40px;}
  .eyebrow{display:flex; align-items:center; gap:10px; font-size:13px; font-weight:700; letter-spacing:2px; color:var(--terracotta); text-transform:uppercase; margin-bottom:14px;}
  .eyebrow::before{content:""; width:24px; height:2px; background:var(--terracotta);}
  .btn{display:inline-block; padding:13px 28px; border-radius:999px; font-weight:700; font-size:15px; cursor:pointer; border:1px solid transparent; transition:all .2s ease;}
  .btn-primary{background:var(--terracotta); color:var(--white);}
  .btn-primary:hover{background:var(--terracotta-dark);}
  .btn-outline{background:transparent; border-color:var(--heading); color:var(--heading);}
  .btn-outline:hover{background:var(--heading); color:var(--white);}
  .btn-dark{background:var(--dark-green); color:var(--white);}
  .btn-dark:hover{opacity:.85;}
  .btn-sm{padding:8px 18px; font-size:13px;}

  /* Header */
  header{position:sticky; top:0; z-index:200; background:rgba(248,244,236,.95); backdrop-filter:blur(6px); border-bottom:1px solid var(--border);}
  nav.wrap{display:flex; align-items:center; justify-content:space-between; padding:18px 40px;}
  .logo{font-family:'Noto Serif KR', serif; font-size:20px; font-weight:700; color:var(--heading);}
  .nav-links{display:flex; align-items:center; gap:30px;}
  .nav-links a{font-weight:500; color:var(--heading); font-size:15px;}
  .nav-links a:hover{color:var(--terracotta);}
  .nav-cta{display:flex; align-items:center; gap:18px;}
  .menu-toggle{display:none; font-size:24px; background:none; border:none; cursor:pointer; color:var(--heading);}

  /* Hero */
  .hero{padding:80px 0 60px;}
  .hero .wrap{display:grid; grid-template-columns:1fr 1fr; gap:60px; align-items:center;}
  .hero h1{font-size:46px; line-height:1.3; margin-bottom:22px;}
  .hero p{margin-bottom:30px; font-size:16px; max-width:480px;}
  .hero-btns{display:flex; gap:14px; flex-wrap:wrap;}
  .hero-imgs{display:grid; grid-template-columns:1.2fr 1fr; grid-template-rows:1fr 1fr; gap:16px; height:400px;}
  .hero-imgs .big{grid-row:1/3; position:relative; border-radius:18px; overflow:hidden;}
  .hero-imgs .small{position:relative; border-radius:18px; overflow:hidden;}
  .hero-imgs img{width:100%; height:100%; object-fit:cover;}
  .cap{position:absolute; left:0; right:0; bottom:0; padding:16px; background:linear-gradient(transparent, rgba(0,0,0,.55)); color:#fff; font-weight:700; font-size:14px;}

  /* Trust strip */
  .trust{background:var(--cream-alt); border-top:1px solid var(--border); border-bottom:1px solid var(--border); padding:22px 0;}
  .trust .wrap{display:flex; flex-wrap:wrap; justify-content:center; gap:14px 40px; text-align:center; font-weight:700; color:var(--heading); font-size:15px;}
  .trust span{opacity:.5; font-weight:400;}

  /* Section common */
  section{padding:90px 0;}
  .section-head{max-width:600px; margin-bottom:50px;}
  .section-head h2{font-size:34px; margin-bottom:12px;}
  .section-head p{font-size:16px;}

  /* Menu */
  #menu{background:var(--cream-alt);}
  .filters{display:flex; gap:12px; margin-bottom:36px; flex-wrap:wrap;}
  .filter-btn{padding:9px 20px; border-radius:999px; border:1px solid var(--border); background:var(--white); font-weight:700; font-size:14px; cursor:pointer; color:var(--heading);}
  .filter-btn.active{background:var(--heading); color:var(--white); border-color:var(--heading);}
  .menu-grid{display:grid; grid-template-columns:repeat(3, 1fr); gap:26px;}
  .menu-card{background:var(--white); border-radius:18px; overflow:hidden; box-shadow:0 6px 20px rgba(0,0,0,.05); display:flex; flex-direction:column;}
  .menu-card .thumb{position:relative; height:220px;}
  .menu-card .thumb img{width:100%; height:100%; object-fit:cover;}
  .price-tag{position:absolute; top:14px; right:14px; background:rgba(0,0,0,.65); color:#fff; font-size:13px; font-weight:700; padding:6px 12px; border-radius:999px;}
  .menu-card .body{padding:20px 22px 24px; display:flex; flex-direction:column; gap:6px; flex:1;}
  .menu-card h3{font-size:19px;}
  .menu-card .desc{font-size:14px; color:var(--text); flex:1;}
  .menu-card .cta-row{margin-top:14px;}
